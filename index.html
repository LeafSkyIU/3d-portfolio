<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<title>3D Portfolio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:#fff;color:#222;min-height:100dvh;overflow-x:hidden;position:relative;
}
::selection{background:rgba(255,125,59,0.25)}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --orange:#FF7D3B;
  --glass-bg:rgba(255,255,255,0.25);
  --glass-border:rgba(255,255,255,0.6);
  --glass-shadow:0 8px 32px rgba(0,0,0,0.06);
  --radius-card:20px;
  --radius-btn:12px;
  --transition:0.3s cubic-bezier(.22,.61,.36,1);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
/* DECORATIONS */
.deco{position:fixed;pointer-events:none;z-index:0;opacity:0.5}
.deco-1{width:60px;height:60px;background:var(--orange);top:8%;left:6%;border-radius:12px;transform:rotate(15deg);opacity:0.25}
.deco-2{width:35px;height:35px;background:var(--orange);top:25%;right:12%;border-radius:8px;transform:rotate(-25deg);opacity:0.18}
.deco-3{width:80px;height:80px;background:var(--orange);bottom:15%;left:4%;border-radius:16px;transform:rotate(40deg);opacity:0.15}
.deco-4{width:45px;height:45px;background:var(--orange);top:60%;right:5%;border-radius:10px;transform:rotate(-10deg);opacity:0.2}
.deco-5{width:25px;height:25px;background:var(--orange);bottom:35%;left:50%;border-radius:6px;transform:rotate(30deg);opacity:0.12}
.deco-6{width:50px;height:50px;background:var(--orange);top:12%;right:25%;border-radius:14px;transform:rotate(60deg);opacity:0.1}
.deco-7{width:30px;height:30px;background:var(--orange);bottom:50%;right:30%;border-radius:7px;transform:rotate(-35deg);opacity:0.15}
@media(max-width:768px){.deco{opacity:0.3}.deco-1,.deco-3,.deco-6{display:none}}

/* GRID */
.page-wrap{position:relative;z-index:2;max-width:1280px;margin:0 auto;padding:40px 16px 60px;min-height:100dvh;display:flex;align-items:center}
.model-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;width:100%}
@media(max-width:640px){.page-wrap{padding:10px 8px 16px}.model-grid{grid-template-columns:1fr;gap:14px}}

/* CARD */
.model-card{
  position:relative;aspect-ratio:4/3;border-radius:var(--radius-card);
  background:var(--glass-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);
  overflow:hidden;cursor:pointer;
  transition:transform var(--transition),box-shadow var(--transition);
  display:flex;align-items:center;justify-content:center;
}
.model-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,0.08)}
.model-card:active{transform:translateY(-2px) scale(0.98)}
@media(max-width:640px){
  .model-card{min-height:75vh;border-radius:16px;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
  .model-card:active{transform:scale(0.97)}
}
.card-thumb{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.card-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:#888;font-size:0.9rem;pointer-events:none;
}
.card-placeholder .icon-plus{
  width:48px;height:48px;border:2px dashed var(--orange);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:var(--orange);font-weight:300;
}
@media(max-width:640px){
  .card-placeholder .icon-plus{width:100px;height:100px;font-size:52px}
  .card-placeholder span{font-size:1.5rem}.card-placeholder{gap:16px}
}
.card-label{
  position:absolute;bottom:12px;left:14px;right:52px;
  font-size:clamp(0.75rem,2vw,0.85rem);font-weight:500;color:#222;
  background:rgba(255,255,255,0.7);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  padding:4px 10px;border-radius:6px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.delete-btn{
  position:absolute;top:10px;right:10px;z-index:5;
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,0.35);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  color:#fff;font-size:15px;line-height:32px;text-align:center;
  transition:background var(--transition),transform var(--transition),opacity var(--transition);
  opacity:0;transform:scale(0.8);
}
.model-card:hover .delete-btn,.delete-btn.show{opacity:1;transform:scale(1)}
.delete-btn:hover{background:rgba(255,60,60,0.8)}
@media(max-width:640px){
  .delete-btn{opacity:1;transform:scale(1);width:52px;height:52px;line-height:52px;font-size:24px}
  .card-label{right:70px;bottom:18px;font-size:1.1rem;padding:8px 16px}
}

/* FOOTER */
footer{position:relative;z-index:2;max-width:1280px;margin:0 auto;padding:0 20px 20px;text-align:center}
.copyright{padding:20px 0;border-top:1px solid rgba(0,0,0,0.04);font-size:0.75rem;color:#bbb;padding-bottom:var(--safe-bottom)}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(255,255,255,0.85);-webkit-backdrop-filter:blur(30px);backdrop-filter:blur(30px);
  display:none;opacity:0;transition:opacity 0.35s ease;
  overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
}
.modal-overlay.active{display:flex;opacity:1}
.modal-inner{
  display:flex;width:100%;height:100%;position:relative;
}
.modal-close{
  position:absolute;top:16px;left:16px;z-index:20;
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,0.08);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#888;transition:all var(--transition);
}
.modal-close:active{transform:scale(0.9);background:rgba(0,0,0,0.12)}

/* CANVAS */
.modal-canvas-wrap{flex:1;position:relative;overflow:hidden}
.modal-loader{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:10;background:rgba(255,255,255,0.6);-webkit-backdrop-filter:blur(40px);backdrop-filter:blur(40px);
  font-size:0.9rem;color:#888;gap:8px;
}
.modal-canvas-wrap canvas{display:block;width:100%!important;height:100%!important}
.screenshot-corner{
  position:absolute;bottom:20px;left:20px;z-index:15;
  width:44px;height:44px;border-radius:12px;
  background:rgba(0,0,0,0.08);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all var(--transition);
}
.screenshot-corner:active{transform:scale(0.92)}

/* PANEL */
.modal-panel{
  width:260px;flex-shrink:0;
  background:var(--glass-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border-left:1px solid var(--glass-border);
  padding:60px 16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;
}
.panel-section h4{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:#888;margin-bottom:8px;font-weight:600}
.panel-btns{display:flex;gap:6px;flex-wrap:wrap}
.panel-btn{
  flex:1;min-width:60px;padding:8px 10px;border-radius:var(--radius-btn);
  background:rgba(255,255,255,0.5);border:1px solid rgba(0,0,0,0.06);
  font-size:0.78rem;color:#888;text-align:center;
  transition:all var(--transition);
}
.panel-btn:active{transform:scale(0.95)}
.panel-btn.active{background:var(--orange);color:#fff;border-color:var(--orange);box-shadow:0 4px 12px rgba(255,125,59,0.25)}
.panel-hint{margin-top:auto;padding-top:12px;border-top:1px solid rgba(0,0,0,0.04);font-size:0.7rem;color:#bbb;line-height:1.6}

@media(max-width:860px){
  .modal-inner{flex-direction:column}
  .modal-canvas-wrap{height:55vh;flex:none}
  .modal-panel{width:100%;flex-direction:row;flex-wrap:wrap;padding:12px 12px 16px;border-left:none;border-top:1px solid var(--glass-border);gap:10px}
  .panel-section{flex:1;min-width:120px}
  .panel-hint{width:100%;margin-top:4px}
}

/* ANIM */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.4s ease both}
</style>
</head>
<body>

<div class="deco deco-1"></div>
<div class="deco deco-2"></div>
<div class="deco deco-3"></div>
<div class="deco deco-4"></div>
<div class="deco deco-5"></div>
<div class="deco deco-6"></div>
<div class="deco deco-7"></div>

<div class="page-wrap">
  <div class="model-grid" id="modelGrid">
    <div class="model-card" id="uploadCard">
      <div class="card-placeholder">
        <div class="icon-plus">+</div>
        <span>上传 3D 模型</span>
      </div>
    </div>
  </div>
</div>

<footer><div class="copyright">© 2026 3D Portfolio</div></footer>

<input type="file" id="modelFileInput" accept=".glb,.gltf,.obj" style="display:none" multiple>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-inner">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-canvas-wrap" id="modalCanvasWrap">
      <div class="modal-loader" id="modalLoader">加载中…</div>
      <button class="screenshot-corner" id="screenshotCorner">📷</button>
    </div>
    <div class="modal-panel" id="modalPanel">
      <div class="panel-section">
        <h4>光照模式</h4>
        <div class="panel-btns">
          <button class="panel-btn active" data-light="day">☀️ 白天</button>
          <button class="panel-btn" data-light="night">🌙 黑夜</button>
        </div>
      </div>
      <div class="panel-section">
        <h4>光照动画</h4>
        <div class="panel-btns">
          <button class="panel-btn" data-anim="toggle">🔄 开启旋转</button>
        </div>
      </div>
      <div class="panel-section">
        <h4>材质显示</h4>
        <div class="panel-btns">
          <button class="panel-btn active" data-mat="textured">🎨 材质</button>
          <button class="panel-btn" data-mat="white">⚪ 白膜</button>
        </div>
      </div>
      <div class="panel-section" style="flex:0">
        <button class="panel-btn" id="modalScreenshotBtn" style="flex:none;width:100%">📷 截图</button>
      </div>
      <div class="panel-hint" id="panelHint">🖱 左键旋转 · 滚轮缩放 · 中键平移</div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

/* ----- STATE ----- */
const STATE = {
  models: [],
  currentModelId: null,
  lightMode: 'day',
  lightAnim: false,
  matMode: 'textured'
};
let renderer, scene, camera, controls, animFrameId;
let currentModelGroup = null;
const isMobile = window.innerWidth < 860;

/* ----- INDEXED DB ----- */
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('ModelDB',1);
    r.onupgradeneeded=()=>{const d=r.result;if(!d.objectStoreNames.contains('models'))d.createObjectStore('models',{keyPath:'id'});};
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function dbPut(store,val){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const t=db.transaction(store,'readwrite');
    t.objectStore(store).put(val);
    t.oncomplete=()=>res();
    t.onerror=()=>rej(t.error);
  });
}
async function dbGetAll(store){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const t=db.transaction(store,'readonly');
    const r=t.objectStore(store).getAll();
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function dbDelete(store,id){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const t=db.transaction(store,'readwrite');
    t.objectStore(store).delete(id);
    t.oncomplete=()=>res();
    t.onerror=()=>rej(t.error);
  });
}

/* ----- RENDER CARDS ----- */
function renderCards(){
  const grid=document.getElementById('modelGrid');
  const uc=document.getElementById('uploadCard');
  // Remove all cards except upload card
  while(grid.children.length>1) grid.removeChild(grid.lastElementChild);
  STATE.models.forEach(m=>{
    const c=document.createElement('div');
    c.className='model-card fade-in';
    c.dataset.modelId=m.id;
    c.title=m.name;
    const thumbStyle=m.thumbnail?'':' style="display:none"';
    c.innerHTML='<img class="card-thumb" src="'+(m.thumbnail||'')+'" draggable="false" loading="lazy"'+thumbStyle+'>'
      +'<div class="card-label">'+m.name+'</div>'
      +'<button class="delete-btn'+(isMobile?' show':'')+'" data-del="'+m.id+'">✕</button>';
    c.addEventListener('click',e=>{
      if(!e.target.closest('.delete-btn')) openModal(m.id);
    });
    grid.appendChild(c);
  });
}

/* ----- UPLOAD ----- */
document.getElementById('modelFileInput').addEventListener('change',async e=>{
  const files=Array.from(e.target.files);
  for(const f of files){
    const id='m_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    const blob=f; // File extends Blob, fine for IndexedDB
    const entry={id,name:f.name,blob,thumbnail:''};
    STATE.models.push(entry);
    await dbPut('models',entry);
  }
  e.target.value='';
  renderCards();
});

// Click upload card → open file dialog
document.getElementById('modelGrid').addEventListener('click',e=>{
  if(e.target.closest('#uploadCard')||e.target.id==='uploadCard'){
    document.getElementById('modelFileInput').click();
    return;
  }
  const d=e.target.closest('[data-del]');
  if(!d) return;
  e.stopPropagation();
  const id=d.getAttribute('data-del');
  STATE.models=STATE.models.filter(m=>m.id!==id);
  dbDelete('models',id);
  renderCards();
  if(STATE.currentModelId===id) closeModal();
});

/* ----- VIEWER ----- */
function initViewer(container){
  renderer=new THREE.WebGLRenderer({
    antialias:true,alpha:true,
    powerPreference:'high-performance'
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,isMobile?1.5:2));
  renderer.setSize(container.clientWidth,container.clientHeight);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.5;
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  scene=new THREE.Scene();
  scene.background=null;

  camera=new THREE.PerspectiveCamera(40,container.clientWidth/container.clientHeight,0.1,100);
  camera.position.set(3,2,5);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  controls.dampingFactor=isMobile?0.12:0.08;
  controls.minDistance=1;
  controls.maxDistance=20;
  controls.target.set(0,0,0);
  controls.update();
  renderer.domElement.style.touchAction='none';

  setupDayLights();
  animate();
}

function setupDayLights(){
  if(!scene) return;
  // Clear old lights
  const toRemove=[];
  scene.children.forEach(c=>{if(c.isLight || c.isLightProbe)toRemove.push(c);});
  toRemove.forEach(c=>scene.remove(c));

  // Key light - bright and warm
  const key=new THREE.DirectionalLight(0xffeedd,2.5);
  key.position.set(5,8,5);
  key.castShadow=true;
  scene.add(key);

  // Fill light
  const fill=new THREE.DirectionalLight(0xffffff,1.2);
  fill.position.set(-4,2,3);
  scene.add(fill);

  // Back rim light
  const rim=new THREE.DirectionalLight(0xffffff,1.0);
  rim.position.set(0,2,-6);
  scene.add(rim);

  // Ambient
  const amb=new THREE.AmbientLight(0xffffff,0.6);
  scene.add(amb);

  // Bottom fill
  const bottom=new THREE.DirectionalLight(0xffffff,0.4);
  bottom.position.set(0,-4,0);
  scene.add(bottom);
}

function setupNightLights(){
  if(!scene) return;
  const toRemove=[];
  scene.children.forEach(c=>{if(c.isLight || c.isLightProbe)toRemove.push(c);});
  toRemove.forEach(c=>scene.remove(c));

  // Three-point studio lighting
  const key=new THREE.DirectionalLight(0xffcc88,2.0);
  key.position.set(4,3,4);
  scene.add(key);

  const fill=new THREE.DirectionalLight(0x88aaff,0.8);
  fill.position.set(-3,1,2);
  scene.add(fill);

  const back=new THREE.DirectionalLight(0xffffff,0.6);
  back.position.set(0,2,-5);
  scene.add(back);

  const amb=new THREE.AmbientLight(0x223355,0.3);
  scene.add(amb);
}

function applyMatMode(){
  if(!scene) return;
  const isWhite=STATE.matMode==='white';
  scene.traverse(child=>{
    if(child.isMesh && child.material){
      if(Array.isArray(child.material)){
        child.material.forEach(mat=>{
          if(isWhite){
            mat._origMap=mat.map;
            mat.map=null;
            mat.color.setHex(0xeeeeee);
            mat.roughness=0.4;
            mat.metalness=0;
          }else{
            if(mat._origMap) mat.map=mat._origMap;
            mat.color.setHex(0xffffff);
            mat.roughness=0.5;
            mat.metalness=0.5;
          }
          mat.needsUpdate=true;
        });
      }else{
        if(isWhite){
          child.material._origMap=child.material.map;
          child.material.map=null;
          child.material.color.setHex(0xeeeeee);
          child.material.roughness=0.4;
          child.material.metalness=0;
        }else{
          if(child.material._origMap) child.material.map=child.material._origMap;
          child.material.color.setHex(0xffffff);
          child.material.roughness=0.5;
          child.material.metalness=0.5;
        }
        child.material.needsUpdate=true;
      }
    }
  });
}

async function loadModelIntoViewer(blob){
  if(currentModelGroup){
    scene.remove(currentModelGroup);
    currentModelGroup.traverse(c=>{if(c.geometry)c.geometry.dispose();});
    currentModelGroup=null;
  }

  const url=URL.createObjectURL(blob);
  const ext=blob.name?blob.name.split('.').pop().toLowerCase():'';

  try{
    const group=await new Promise((res,rej)=>{
      if(ext==='obj'){
        const loader=new OBJLoader();
        loader.load(url,g=>res(g),()=>{},e=>rej(e));
      }else{
        const loader=new GLTFLoader();
        loader.load(url,g=>res(g.scene||g),()=>{},e=>rej(e));
      }
    });

    // Compute bounding box for centering
    const box=new THREE.Box3().setFromObject(group);
    const center=box.getCenter(new THREE.Vector3());
    const size=box.getSize(new THREE.Vector3());
    const maxDim=Math.max(size.x,size.y,size.z);
    const scale=maxDim>0?2.0/maxDim:1;

    group.position.sub(center).multiplyScalar(scale);
    group.scale.set(scale,scale,scale);

    currentModelGroup=group;
    scene.add(group);
    applyMatMode();

    URL.revokeObjectURL(url);
    return group;
  }catch(e){
    URL.revokeObjectURL(url);
    throw e;
  }
}

function animate(){
  animFrameId=requestAnimationFrame(animate);
  if(STATE.lightAnim && scene){
    // Rotate directional lights around Y
    scene.children.forEach(child=>{
      if(child.isDirectionalLight || child.type==='DirectionalLight'){
        const pos=new THREE.Vector3();
        child.getWorldPosition(pos);
        const radius=Math.sqrt(pos.x*pos.x+pos.z*pos.z);
        const angle=Math.atan2(pos.z,pos.x)+0.005;
        pos.x=radius*Math.cos(angle);
        pos.z=radius*Math.sin(angle);
        child.position.copy(pos);
      }
    });
  }
  if(controls) controls.update();
  if(renderer && scene && camera) renderer.render(scene,camera);
}

/* ----- MODAL ----- */
async function openModal(modelId){
  const overlay=document.getElementById('modalOverlay');
  overlay.classList.add('active');
  document.body.style.overflow='hidden';
  STATE.currentModelId=modelId;

  const c=document.getElementById('modalCanvasWrap');
  const loader=document.getElementById('modalLoader');
  loader.style.display='flex';

  if(!renderer){
    initViewer(c);
  }else{
    if(renderer.domElement.parentNode) renderer.domElement.remove();
    c.appendChild(renderer.domElement);
    camera.aspect=c.clientWidth/c.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(c.clientWidth,c.clientHeight);
    controls.dispose();
    controls=new OrbitControls(camera,renderer.domElement);
    controls.enableDamping=true;
    controls.dampingFactor=isMobile?0.12:0.08;
    controls.minDistance=1;
    controls.maxDistance=20;
    controls.target.set(0,0,0);
    controls.update();
    renderer.domElement.style.touchAction='none';
  }

  const m=STATE.models.find(x=>x.id===modelId);
  if(m){
    try{
      await loadModelIntoViewer(m.blob);
    }catch(e){
      console.error(e);
    }
  }
  loader.style.display='none';
  loadSettingsForModel(modelId);
}

function closeModal(){
  const overlay=document.getElementById('modalOverlay');
  overlay.classList.remove('active');
  document.body.style.overflow='';
  STATE.currentModelId=null;
  if(renderer && renderer.domElement.parentNode) renderer.domElement.remove();
}

document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',e=>{
  if(e.target===e.currentTarget) closeModal();
});

/* ----- SCREENSHOT ----- */
async function takeScreenshot(){
  if(!renderer || !scene || !camera || !STATE.currentModelId) return;
  renderer.render(scene,camera);
  const du=renderer.domElement.toDataURL('image/png');
  const m=STATE.models.find(x=>x.id===STATE.currentModelId);
  if(m){
    m.thumbnail=du;
    await dbPut('models',m);
    // Update card thumbnail
    const card=document.querySelector('[data-model-id="'+m.id+'"]');
    if(card){
      let img=card.querySelector('.card-thumb');
      if(!img){
        img=document.createElement('img');
        img.className='card-thumb';
        img.draggable=false;
        img.loading='lazy';
        card.insertBefore(img,card.querySelector('.card-label'));
      }
      img.src=du;
      img.style.display='';
    }
  }
}

document.getElementById('modalScreenshotBtn').addEventListener('click',takeScreenshot);
document.getElementById('screenshotCorner').addEventListener('click',takeScreenshot);

/* ----- PANEL CONTROLS ----- */
document.querySelectorAll('[data-light]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-light]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    STATE.lightMode=b.getAttribute('data-light');
    if(STATE.lightMode==='day') setupDayLights();
    else setupNightLights();
  });
});

document.querySelector('[data-anim="toggle"]').addEventListener('click',function(){
  STATE.lightAnim=!STATE.lightAnim;
  this.classList.toggle('active');
  this.textContent=STATE.lightAnim?'🔄 旋转中…':'🔄 开启旋转';
});

document.querySelectorAll('[data-mat]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-mat]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    STATE.matMode=b.getAttribute('data-mat');
    applyMatMode();
  });
});

async function loadSettingsForModel(modelId){
  const m=STATE.models.find(x=>x.id===modelId);
  if(!m||!m.settings) return;
  const s=m.settings;
  if(s.lightMode){
    STATE.lightMode=s.lightMode;
    document.querySelectorAll('[data-light]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-light')===s.lightMode));
    if(s.lightMode==='day') setupDayLights();
    else setupNightLights();
  }
  if(s.lightAnim){
    STATE.lightAnim=s.lightAnim;
    const btn=document.querySelector('[data-anim="toggle"]');
    if(btn){
      btn.classList.toggle('active',s.lightAnim);
      btn.textContent=s.lightAnim?'🔄 旋转中…':'🔄 开启旋转';
    }
  }
  if(s.matMode){
    STATE.matMode=s.matMode;
    document.querySelectorAll('[data-mat]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-mat')===s.matMode));
    applyMatMode();
  }
}

/* ----- INIT ----- */
async function initApp(){
  try{
    const models=await dbGetAll('models');
    STATE.models=models.filter(m=>m.blob);
    renderCards();
    console.log('3D Portfolio loaded, models:',STATE.models.length);
  }catch(e){
    console.error('Init error:',e);
  }
}
initApp();

document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});

if(isMobile){
  const h=document.getElementById('panelHint');
  if(h) h.textContent='👆 单指旋转 · 双指缩放 · 双指平移';
}

document.addEventListener('visibilitychange',()=>{
  if(document.hidden && animFrameId){
    cancelAnimationFrame(animFrameId);
    animFrameId=null;
  }else if(!document.hidden && !animFrameId){
    animate();
  }
});

console.log('3D Portfolio ready'+(isMobile?' (mobile mode)':''));
</script>
