<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<title>3D 模型作品集</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:#fff;color:#222222;min-height:100dvh;overflow-x:hidden;position:relative;display:flex;flex-direction:column;
  overscroll-behavior:none;
}
::selection{background:rgba(255,125,59,0.25)}
img{max-width:100%;display:block}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
a{color:#222222;text-decoration:none;-webkit-tap-highlight-color:transparent}
:root{
  --orange:#FF7D3B;
  --orange-light:rgba(255,120,0,0.08);
  --orange-mid:rgba(255,120,0,0.18);
  --glass-bg:rgba(255,255,255,0.25);
  --glass-border:rgba(255,255,255,0.6);
  --glass-shadow:0 8px 32px rgba(0,0,0,0.06);
  --radius-card:20px;
  --radius-btn:12px;
  --radius-sm:8px;
  --transition:0.3s cubic-bezier(.22,.61,.36,1);
  --max-w:1280px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
/* ===== DECORATIONS ===== */
.deco{position:fixed;pointer-events:none;z-index:0;opacity:0.5;will-change:transform}
.deco-1{width:60px;height:60px;background:var(--orange);top:8%;left:6%;border-radius:12px;transform:rotate(15deg);opacity:0.25}
.deco-2{width:35px;height:35px;background:var(--orange);top:25%;right:12%;border-radius:8px;transform:rotate(-25deg);opacity:0.18}
.deco-3{width:80px;height:80px;background:var(--orange);bottom:15%;left:4%;border-radius:16px;transform:rotate(40deg);opacity:0.15}
.deco-4{width:45px;height:45px;background:var(--orange);top:60%;right:5%;border-radius:10px;transform:rotate(-10deg);opacity:0.2}
.deco-5{width:25px;height:25px;background:var(--orange);bottom:35%;left:50%;border-radius:6px;transform:rotate(30deg);opacity:0.12}
.deco-6{width:50px;height:50px;background:var(--orange);top:12%;right:25%;border-radius:14px;transform:rotate(60deg);opacity:0.1}
.deco-7{width:30px;height:30px;background:var(--orange);bottom:50%;right:30%;border-radius:7px;transform:rotate(-35deg);opacity:0.15}
@media(max-width:768px){
  .deco{opacity:0.3}
  .deco-1,.deco-3,.deco-6{display:none}
}
/* ===== HEADER ===== */
header{position:relative;z-index:2;text-align:center;padding:clamp(60px,12vw,100px) 20px clamp(40px,8vw,60px);contain:layout style}
header h1{
  font-size:clamp(1.8rem,7vw,4.5rem);font-weight:700;letter-spacing:-0.03em;
  background:linear-gradient(135deg,#222222 40%,var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:12px;
}
header p{font-size:clamp(0.85rem,2.5vw,1.2rem);color:#888888;font-weight:400;letter-spacing:0.06em;padding:0 10px}
/* ===== GRID ===== */
section.grid-section{position:relative;z-index:2;max-width:var(--max-w);margin:0 auto;padding:40px 16px 60px;contain:layout style;min-height:100dvh;display:flex;align-items:center}
.model-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;width:100%;max-width:1200px;margin:0 auto}

@media(max-width:640px){section.grid-section{padding:10px 8px 16px}.model-grid{grid-template-columns:1fr;gap:14px;padding:0;max-width:100%}}
/* ===== MODEL CARD ===== */
.model-card{width:100%;
  position:relative;aspect-ratio:4/3;border-radius:var(--radius-card);
  background:var(--glass-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);
  overflow:hidden;cursor:pointer;contain:layout paint style;
  transition:transform var(--transition),box-shadow var(--transition);
  display:flex;align-items:center;justify-content:center;
  will-change:transform;
}
.model-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,0.08)}
.model-card:active{transform:translateY(-2px) scale(0.98)}
@media(max-width:640px){
  .model-card{width:100%;min-height:68vh;border-radius:16px;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
  .model-card:active{transform:scale(0.97)}
}
.model-card .card-thumb{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;will-change:transform}
.model-card .card-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:#888888;font-size:0.9rem;pointer-events:none;
}
.model-card .card-placeholder .icon-plus{
  width:48px;height:48px;border:2px dashed var(--orange);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:var(--orange);font-weight:300;
}
@media(max-width:640px){.model-card .card-placeholder .icon-plus{width:100px;height:100px;font-size:52px}.model-card .card-placeholder span{font-size:1.5rem}.model-card .card-placeholder{gap:16px}}
.model-card .card-label{
  position:absolute;bottom:12px;left:14px;right:52px;
  font-size:clamp(0.75rem,2vw,0.85rem);font-weight:500;color:#222222;
  background:rgba(255,255,255,0.7);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  padding:4px 10px;border-radius:6px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
/* Delete */
.model-card .delete-btn{
  position:absolute;top:10px;right:10px;z-index:5;
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,0.35);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  color:#fff;font-size:15px;line-height:32px;text-align:center;
  transition:background var(--transition),transform var(--transition),opacity var(--transition);
  opacity:0;transform:scale(0.8);will-change:transform,opacity;
}
.model-card:hover .delete-btn,.model-card .delete-btn.show{opacity:1;transform:scale(1)}
.model-card .delete-btn:hover{background:rgba(255,60,60,0.8);transform:scale(1.1)}
.model-card .delete-btn:active{background:rgba(255,60,60,0.9);transform:scale(0.93)}
@media(max-width:640px){
  .model-card .delete-btn{opacity:1;transform:scale(1);width:52px;height:52px;line-height:52px;font-size:24px}
  .model-card .card-label{right:70px;bottom:18px;font-size:1.1rem;padding:8px 16px}
}
/* ===== FOOTER ===== */
footer{position:relative;z-index:2;max-width:var(--max-w);margin:0 auto;padding:40px 20px 20px;border-top:1px solid rgba(0,0,0,0.06)}
.footer-inner{display:grid;grid-template-columns:1fr 1fr;gap:40px}
@media(max-width:640px){.footer-inner{grid-template-columns:1fr;gap:28px}}
.footer-col h3{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.12em;color:#888888;margin-bottom:12px;font-weight:600}
.footer-col p{font-size:0.9rem;line-height:1.7;color:#888888;max-width:380px}
.footer-col .contact-links{display:flex;flex-direction:column;gap:8px}
.footer-col .contact-links a{font-size:0.9rem;color:#888888;display:inline-flex;align-items:center;gap:8px;padding:4px 0;min-height:36px}
.footer-col .contact-links a:active{color:var(--orange)}
.copyright{text-align:center;padding-top:30px;margin-top:30px;border-top:1px solid rgba(0,0,0,0.04);font-size:0.75rem;color:#bbb;padding-bottom:var(--safe-bottom)}
/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(255,255,255,0.85);-webkit-backdrop-filter:blur(30px);backdrop-filter:blur(30px);
  display:none;opacity:0;transition:opacity 0.35s ease;will-change:opacity;
  overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
}
.modal-overlay.active{display:flex;opacity:1}
.modal-inner{width:100%;height:100%;display:flex;position:relative}
@media(max-width:768px){.modal-inner{flex-direction:column}}
.modal-canvas-wrap{flex:1;position:relative;min-width:0;min-height:0;overflow:hidden;contain:layout paint style}
.modal-canvas-wrap canvas{display:block;width:100%!important;height:100%!important}
@media(max-width:768px){.modal-canvas-wrap{flex:1 1 55%;min-height:40vh}}
/* Close */
.modal-close{
  position:absolute;top:16px;left:16px;z-index:10;
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,0.06);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#888888;
  transition:all var(--transition);will-change:transform;
}
.modal-close:active{transform:scale(0.9);background:rgba(0,0,0,0.12)}
/* ===== RIGHT PANEL (mobile optimized) ===== */
.panel{
  width:320px;flex-shrink:0;
  background:rgba(255,255,255,0.5);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border-left:1px solid rgba(255,255,255,0.3);
  padding:24px 20px;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;gap:18px;
  -webkit-overflow-scrolling:touch;
}
@media(max-width:768px){
  .panel{
    width:100%;flex:0 0 auto;max-height:45vh;
    border-left:none;border-top:1px solid rgba(255,255,255,0.3);
    padding:16px 14px calc(16px + var(--safe-bottom));gap:14px;
  }
}
.panel-group{}
.panel-group-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.12em;color:#888888;margin-bottom:8px;font-weight:600}
.panel-btns{display:flex;gap:6px;flex-wrap:wrap}
.panel-btn{
  padding:9px 14px;border-radius:var(--radius-btn);
  background:rgba(255,255,255,0.5);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  border:1px solid rgba(0,0,0,0.06);
  font-size:0.78rem;color:#222222;white-space:nowrap;
  transition:all var(--transition);min-height:36px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.panel-btn:active{transform:scale(0.95)}
.panel-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
@media(max-width:768px){
  .panel-btn{padding:10px 14px;min-height:40px;font-size:0.82rem;flex:1 1 auto}
}

@media(max-width:768px){}

/* Hint */
.panel-hint{font-size:0.68rem;color:#888888;text-align:center;line-height:1.5;padding-top:6px;border-top:1px solid rgba(0,0,0,0.04)}
/* Loading */
.modal-screenshot{
  position:absolute;bottom:20px;left:16px;z-index:10;
  padding:10px 16px;border-radius:var(--radius-btn);
  background:rgba(255,255,255,0.7);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.5);
  font-size:0.82rem;color:#222222;display:flex;align-items:center;gap:8px;
  transition:all var(--transition);min-height:40px;will-change:transform;
}
.modal-screenshot:active{transform:scale(0.96)}
@media(max-width:768px){.modal-screenshot{bottom:12px;left:12px;padding:8px 12px;font-size:0.78rem;min-height:36px}}
.loading-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none}
.loading-spinner .spinner{width:28px;height:28px;border:2px solid rgba(0,0,0,0.06);border-top-color:var(--orange);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Fade */
.fade-in{animation:fadeIn 0.45s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="deco deco-1"></div><div class="deco deco-2"></div>
<div class="deco deco-3"></div><div class="deco deco-4"></div>
<div class="deco deco-5"></div><div class="deco deco-6"></div><div class="deco deco-7"></div>

<section class="grid-section">
  <div class="model-grid" id="modelGrid">
    <div class="model-card" id="uploadCard">
      <div class="card-placeholder">
        <div class="icon-plus">+</div>
        <span>上传 3D 模型</span>
      </div>
    </div>
  </div>
</section>
<footer>
  <div class="copyright">© 2026 个人 3D 模型作品集 · All Rights Reserved</div>
</footer>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-inner">
    <div class="modal-canvas-wrap" id="modalCanvasWrap">
      <div class="loading-spinner" id="modalLoader"><div class="spinner"></div></div>
      <button class="modal-close" id="modalClose">✕</button>
      <button class="modal-screenshot" id="modalScreenshotBtn">📷 截图</button>
    </div>
    <div class="panel" id="panel">
      <div class="panel-group">
        <div class="panel-group-label">光照模式</div>
        <div class="panel-btns">
          <button class="panel-btn active" data-light="day">☀ 白天</button>
          <button class="panel-btn" data-light="night">🌙 黑夜</button>
        </div>
      </div>
      <div class="panel-group">
        <div class="panel-group-label">光照动画</div>
        <div class="panel-btns">
          <button class="panel-btn" data-anim="toggle">🔄 自动旋转光照</button>
        </div>
      </div>
      <div class="panel-group">
        <div class="panel-group-label">材质显示</div>
        <div class="panel-btns">
          <button class="panel-btn active" data-mat="textured">🎨 材质模式</button>
          <button class="panel-btn" data-mat="white">⚪ 白膜模式</button>
        </div>
      </div>
      
      <div class="panel-hint" id="panelHint">🖱 左键旋转 · 滚轮缩放 · 中键平移</div>
    </div>
  </div>
</div>
<input type="file" id="modelFileInput" accept=".glb,.gltf,.obj" style="display:none" multiple>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
/* ----- STATE ----- */
const STATE = {
  models: [], currentModelId: null,  lightMode: 'day', lightAnim: false, matMode: 'textured', envMap: null,
};
/* ----- IDB ----- */
function openDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open('ModelPortfolio',1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('models')) db.createObjectStore('models',{keyPath:'id'});
    };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbPut(store,val){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    tx.objectStore(store).put(val);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}
async function dbGetAll(store){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).getAll();
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbDelete(store,id){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}
/* ----- MOBILE DETECT ----- */
const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const dpr = Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2);
/* ----- THREE CORE ----- */
let renderer, scene, camera, controls, modelGroup, lightGroup, currentModelObj;
let animFrameId, lightAnimAngle = 0, pmrem;
function initViewer(container){
  renderer = new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:'high-performance'});
  renderer.setPixelRatio(dpr);
  renderer.setSize(container.clientWidth,container.clientHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  container.appendChild(renderer.domElement);
  scene = new THREE.Scene(); scene.background = new THREE.Color(0xf2f2f2);
  const aspect = container.clientWidth / container.clientHeight;
  camera = new THREE.PerspectiveCamera(isMobile ? 45 : 40, aspect, 0.1, 100);
  camera.position.set(3, isMobile ? 1.8 : 2, isMobile ? 4.5 : 5);
  controls = new OrbitControls(camera,renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = isMobile ? 0.12 : 0.08;
  controls.minDistance = 1.5; controls.maxDistance = 20;
  controls.target.set(0,0,0); controls.update();
  modelGroup = new THREE.Group(); scene.add(modelGroup);
  lightGroup = new THREE.Group(); scene.add(lightGroup);
  setupDayLights();
  pmrem = new THREE.PMREMGenerator(renderer); pmrem.compileCubemapShader(); setDefaultEnv();
  const ro = new ResizeObserver(()=>{
    const w=container.clientWidth,h=container.clientHeight;
    if(w<1||h<1) return;
    camera.aspect=w/h; camera.updateProjectionMatrix();
    renderer.setSize(w,h);
  });
  ro.observe(container);
  renderer.domElement.style.touchAction='none';
  animate();
}
function animate(){
  animFrameId = requestAnimationFrame(animate);
  if(STATE.lightAnim){ lightAnimAngle += 0.005; lightGroup.rotation.y = lightAnimAngle; }
  controls.update(); renderer.render(scene,camera);
}
function setDefaultEnv(){
  const se = new THREE.Scene(); const et = pmrem.fromScene(se);
  STATE.envMap = et.texture; scene.environment = STATE.envMap;
}
function setupDayLights(){
  while(lightGroup.children.length) lightGroup.remove(lightGroup.children[0]);
  const a=new THREE.AmbientLight(0xffffff,isMobile?0.4:0.5);lightGroup.add(a);
  const k1=new THREE.DirectionalLight(0xffffff,isMobile?3.0:4.0);k1.position.set(5,10,4);lightGroup.add(k1);
  const k2=new THREE.DirectionalLight(0xffffff,isMobile?1.5:2.0);k2.position.set(-3,5,-2);lightGroup.add(k2);
  const rm=new THREE.DirectionalLight(0xffffff,isMobile?1.0:1.2);rm.position.set(3,-2,-5);lightGroup.add(rm);
  const h=new THREE.HemisphereLight(0xffffff,0xaaaaaa,isMobile?0.3:0.4);lightGroup.add(h);
  scene.background=new THREE.Color(0xf2f2f2);renderer.toneMappingExposure=isMobile?1.3:1.5;
}
function setupNightLights(){
  while(lightGroup.children.length) lightGroup.remove(lightGroup.children[0]);
  const k=new THREE.DirectionalLight(0xffeedd,isMobile?3.5:4.5);k.position.set(5,8,4);lightGroup.add(k);
  const f=new THREE.DirectionalLight(0xaaccff,isMobile?1.2:1.5);f.position.set(-4,3,-5);lightGroup.add(f);
  const r=new THREE.DirectionalLight(0xffffff,isMobile?2.0:2.5);r.position.set(1,-4,-6);lightGroup.add(r);
  const a=new THREE.AmbientLight(0x222244,isMobile?0.2:0.3);lightGroup.add(a);
  scene.background=new THREE.Color(0x181818);renderer.toneMappingExposure=isMobile?0.9:1.1;
}
/* ----- LOAD MODEL ----- */
async function loadModelIntoViewer(blob){
  const url = URL.createObjectURL(blob);
  const isObj = blob.name && blob.name.toLowerCase().endsWith('.obj');
  const LoaderClass = isObj ? OBJLoader : GLTFLoader;
  const loader = new LoaderClass();
  return new Promise((res,rej)=>{
    loader.load(url,function(result){
      const m = isObj ? result : result.scene;
      while(modelGroup.children.length){
        const c=modelGroup.children[0];
        if(c.geometry) c.geometry.dispose();
        if(c.material){if(Array.isArray(c.material))c.material.forEach(mt=>mt.dispose());else c.material.dispose();}
        modelGroup.remove(c);
      }
      const box=new THREE.Box3().setFromObject(m);
      const size=box.getSize(new THREE.Vector3());
      const maxDim=Math.max(size.x,size.y,size.z);
      const scale=maxDim>0?2.5/maxDim:1;
      m.scale.set(scale,scale,scale);
      m.position.sub(box.getCenter(new THREE.Vector3()).clone().multiplyScalar(scale));
      modelGroup.add(m); currentModelObj=m; applyMatMode();
      URL.revokeObjectURL(url);
      document.getElementById('modalLoader').style.display='none';
      res(m);
    },undefined,rej);
  });
}
function applyMatMode(){
  if(!currentModelObj) return;
  currentModelObj.traverse(child=>{
    if(child.isMesh){
      if(STATE.matMode==='white'){
        if(!child.userData.origMat) child.userData.origMat=child.material;
        child.material=new THREE.MeshStandardMaterial({color:0xeeeeee,roughness:0.4,metalness:0.0});
      } else if(child.userData.origMat) child.material=child.userData.origMat;
      child.material.needsUpdate=true;
    }
  });
}
/* ----- SCREENSHOT ----- */
async function takeScreenshot(){
  renderer.render(scene,camera);
  const du=renderer.domElement.toDataURL('image/png');
  if(STATE.currentModelId){
    const m=STATE.models.find(x=>x.id===STATE.currentModelId);
    if(m){m.thumbnail=du;await dbPut('models',m);_updateThumb(m.id,du);}
  }
}
function _updateThumb(id,src){

function renderCards(){
  const grid=document.getElementById('modelGrid'),uc=document.getElementById('uploadCard');
  while(grid.children.length>1) grid.removeChild(grid.lastElementChild);
  STATE.models.forEach(m=>{
    const c=document.createElement('div');c.className='model-card fade-in';
    c.setAttribute('data-model-id',m.id);c.title=m.name;
    const ts=m.thumbnail?'':' style="display:none"';
    c.innerHTML='<img class="card-thumb" src="'+(m.thumbnail||'')+'" draggable="false" loading="lazy"'+ts+'>'
      +'<div class="card-label">'+m.name+'</div>'
      +'<button class="delete-btn'+(isMobile?' show':'')+'" data-del="'+m.id+'">\u2715</button>';
    c.addEventListener('click',e=>{if(!e.target.closest('.delete-btn'))openModal(m.id);});
    grid.appendChild(c);
  });
}

/* ----- MODAL OPEN/CLOSE ----- */
async function openModal(modelId){
  const overlay=document.getElementById('modalOverlay');overlay.classList.add('active');
  document.body.style.overflow='hidden';STATE.currentModelId=modelId;
  const c=document.getElementById('modalCanvasWrap');
  document.getElementById('modalLoader').style.display='flex';
  if(!renderer){initViewer(c);}else{
    if(renderer.domElement.parentNode)renderer.domElement.remove();
    c.appendChild(renderer.domElement);
    camera.aspect=c.clientWidth/c.clientHeight;camera.updateProjectionMatrix();
    renderer.setSize(c.clientWidth,c.clientHeight);
    controls.dispose();
    controls=new OrbitControls(camera,renderer.domElement);
    controls.enableDamping=true;controls.dampingFactor=isMobile?0.12:0.08;
    controls.minDistance=1.5;controls.maxDistance=20;
    controls.target.set(0,0,0);controls.update();
    renderer.domElement.style.touchAction='none';
  }
  const m=STATE.models.find(x=>x.id===modelId);
  if(m){try{await loadModelIntoViewer(m.blob);}catch(e){console.error(e);document.getElementById('modalLoader').style.display='none';}}
  document.getElementById('modalLoader').style.display='none';
  loadSettingsForModel(modelId);
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow='';STATE.currentModelId=null;
  if(renderer&&renderer.domElement.parentNode)renderer.domElement.remove();
}
